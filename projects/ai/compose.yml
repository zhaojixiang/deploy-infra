# Blue/green: frontend_blue + frontend_green, backend_blue + backend_green behind edge nginx.
# Image tags are set per slot via TAG_* env vars (never use latest).
# Run from repo root or project dir with scripts/blue-green-deploy.sh

name: ${COMPOSE_PROJECT_NAME:-ai-stack}

services:
  nginx:
    image: nginx:1.27-alpine
    ports:
      - "${PUBLIC_HTTP_PORT:-80}:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:rw
    depends_on:
      frontend_blue:
        condition: service_healthy
      frontend_green:
        condition: service_healthy
      backend_blue:
        condition: service_healthy
      backend_green:
        condition: service_healthy
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s

  frontend_blue:
    image: ${REGISTRY}/${NAMESPACE}/ai-frontend:${TAG_FRONTEND_BLUE}
    restart: unless-stopped
    expose:
      - "80"
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "3"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 90s

  frontend_green:
    image: ${REGISTRY}/${NAMESPACE}/ai-frontend:${TAG_FRONTEND_GREEN}
    restart: unless-stopped
    expose:
      - "80"
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "3"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 90s

  mysql:
    image: mysql:8.4
    command: >
      --character-set-server=utf8mb4
      --collation-server=utf8mb4_unicode_ci
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-localroot}
      MYSQL_DATABASE: ${DB_NAME:-ai}
      MYSQL_USER: ${DB_USER:-ai}
      MYSQL_PASSWORD: ${DB_PASSWORD:-aipass}
    volumes:
      - mysql_data:/var/lib/mysql
    # 仅监听 ECS 本机回环，供 SSH 隧道 + DBeaver 等工具使用；不应对 0.0.0.0 暴露到公网
    ports:
      - "127.0.0.1:${MYSQL_PUBLISH_PORT:-3306}:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-uroot", "-p${MYSQL_ROOT_PASSWORD:-localroot}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "3"

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 5s
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "3"

  backend_blue:
    image: ${REGISTRY}/${NAMESPACE}/ai-backend:${TAG_BACKEND_BLUE}
    restart: unless-stopped
    expose:
      - "3000"
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      PORT: "3000"
      PUBLIC_BASE_URL: ${PUBLIC_BASE_URL:-http://127.0.0.1:3000}
      CORS_ORIGIN: ${CORS_ORIGIN:-*}
      SERVE_STORAGE: ${SERVE_STORAGE:-true}
      MAX_CONCURRENT_VIDEO_JOBS: ${MAX_CONCURRENT_VIDEO_JOBS:-2}
      DOWNLOAD_TIMEOUT_MS: ${DOWNLOAD_TIMEOUT_MS:-600000}
      FFMPEG_TIMEOUT_MS: ${FFMPEG_TIMEOUT_MS:-3600000}
      PYTHON_BIN: ${PYTHON_BIN:-/app/python/venv/bin/python}
      DB_HOST: ${DB_HOST:-mysql}
      DB_PORT: ${DB_PORT:-3306}
      DB_USER: ${DB_USER:-ai}
      DB_PASSWORD: ${DB_PASSWORD:-aipass}
      DB_NAME: ${DB_NAME:-ai}
      DB_SYNC: ${DB_SYNC:-false}
      REDIS_HOST: ${REDIS_HOST:-redis}
      REDIS_PORT: ${REDIS_PORT:-6379}
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
    volumes:
      - backend_storage:/app/storage
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:3000/health"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 120s

  backend_green:
    image: ${REGISTRY}/${NAMESPACE}/ai-backend:${TAG_BACKEND_GREEN}
    restart: unless-stopped
    expose:
      - "3000"
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      PORT: "3000"
      PUBLIC_BASE_URL: ${PUBLIC_BASE_URL:-http://127.0.0.1:3000}
      CORS_ORIGIN: ${CORS_ORIGIN:-*}
      SERVE_STORAGE: ${SERVE_STORAGE:-true}
      MAX_CONCURRENT_VIDEO_JOBS: ${MAX_CONCURRENT_VIDEO_JOBS:-2}
      DOWNLOAD_TIMEOUT_MS: ${DOWNLOAD_TIMEOUT_MS:-600000}
      FFMPEG_TIMEOUT_MS: ${FFMPEG_TIMEOUT_MS:-3600000}
      PYTHON_BIN: ${PYTHON_BIN:-/app/python/venv/bin/python}
      DB_HOST: ${DB_HOST:-mysql}
      DB_PORT: ${DB_PORT:-3306}
      DB_USER: ${DB_USER:-ai}
      DB_PASSWORD: ${DB_PASSWORD:-aipass}
      DB_NAME: ${DB_NAME:-ai}
      DB_SYNC: ${DB_SYNC:-false}
      REDIS_HOST: ${REDIS_HOST:-redis}
      REDIS_PORT: ${REDIS_PORT:-6379}
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
    volumes:
      - backend_storage:/app/storage
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:3000/health"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 120s

volumes:
  backend_storage:
  mysql_data:
  redis_data:
