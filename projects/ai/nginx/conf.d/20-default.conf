# Exact routes first — backend container listens on /health (no /api prefix)
server {
    listen 80;
    server_name _;

    location = /health {
        access_log off;
        default_type text/plain;
        return 200 'edge-ok\n';
    }

    # Hook: replace with scrape config when Prometheus is added
    location = /metrics {
        access_log off;
        default_type text/plain;
        return 404 'metrics not configured\n';
    }

    location = /api/health {
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_pass http://backend_active/health;
    }

    # 仅边缘约定：浏览器/前端用 /api 与静态页区分；Nest 无 /api，由末尾 / 剥掉前缀。
    # 例：GET/POST .../api/video/process -> 上游 .../video/process
    location /api/ {
        client_max_body_size 2g;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
        proxy_request_buffering off;
        proxy_pass http://backend_active/;
    }

    location / {
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_pass http://frontend_active;
    }
}
