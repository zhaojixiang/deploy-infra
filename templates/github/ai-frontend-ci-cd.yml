# Copy to ai-frontend repository as: .github/workflows/ci-cd.yml
# Requires: Dockerfile at repo root, pnpm + pnpm-lock.yaml, docker/nginx/default.conf (see deploy-infra templates).

name: CI/CD ai-frontend

on:
  push:
    branches: [main, develop, test]

concurrency:
  group: ai-frontend-${{ github.ref }}
  cancel-in-progress: false

env:
  REGISTRY: crpi-3iew34pvm0fklze5.cn-chengdu.personal.cr.aliyuncs.com
  NAMESPACE: jijiking1
  IMAGE_NAME: ai-frontend

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      deploy_env: ${{ steps.envmeta.outputs.deploy_env }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Compute version
        id: version
        run: |
          VERSION="$(date -u +%Y%m%d)-${GITHUB_SHA:0:7}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Resolve deploy environment
        id: envmeta
        run: |
          case "${GITHUB_REF}" in
            refs/heads/main) echo "deploy_env=prod" >> "$GITHUB_OUTPUT" ;;
            refs/heads/develop) echo "deploy_env=dev" >> "$GITHUB_OUTPUT" ;;
            refs/heads/test) echo "deploy_env=test" >> "$GITHUB_OUTPUT" ;;
            *) echo "deploy_env=dev" >> "$GITHUB_OUTPUT" ;;
          esac

      - name: Install & build (fail stops pipeline)
        run: |
          corepack enable && corepack prepare pnpm@9 --activate
          pnpm install --frozen-lockfile
          pnpm run build

      - name: Login to ACR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.NAMESPACE }}/${{ env.IMAGE_NAME }}:${{ steps.version.outputs.version }}
          build-args: |
            ENV_BASE=/
            ENV_NAME=pro

  deploy:
    needs: build
    if: success() && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop' || github.ref == 'refs/heads/test')
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        env:
          VERSION: ${{ needs.build.outputs.version }}
          DEPLOY_ENV: ${{ needs.build.outputs.deploy_env }}
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_KEY }}
          script_stop: true
          script: |
            set -euo pipefail
            DEPLOY_ROOT="${{ secrets.DEPLOY_ROOT }}"
            DEPLOY_ROOT="${DEPLOY_ROOT:-$HOME/deploy-infra}"
            cd "$DEPLOY_ROOT"
            git pull --ff-only || true
            echo "${{ secrets.ACR_PASSWORD }}" | docker login "${{ env.REGISTRY }}" -u "${{ secrets.ACR_USERNAME }}" --password-stdin
            ./scripts/blue-green-deploy.sh frontend "$VERSION" "$DEPLOY_ENV"
